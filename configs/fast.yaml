supported_formats:
  - txt
  - csv
  - json
  - html
  - pdf
  - docx
  - parquet

scan:
  continue_on_error: true
  include_hidden: false
  follow_symlinks: false
  use_mime_detection: false
  max_file_size_mb: 128
  csv_chunk_size: 500
  workers: 1

feature_flags:
  include_masked_samples: false
  enable_sensitive_detectors: true
  enable_template_heuristics: true
  enable_ocr: false

detection:
  context_window: 40
  phone_min_digits: 10
  phone_max_digits: 11
  max_text_chunks_per_file: 1000

ocr:
  mode: "off"
  language: rus+eng
  max_pages_per_file: 0
  max_images_per_file: 0
  min_image_edge_px: 1200

reporting:
  create_csv: true
  create_json: true
  create_markdown: true
  summary_csv_name: summary.csv
  result_csv_name: result.csv
  json_report_name: report.json
  markdown_report_name: report.md

masking:
  enabled: true
  secret_env_var: PDN_MASKING_SECRET
  default_salt: local-dev-salt
  hash_length: 12
  preview_prefix: 1
  preview_suffix: 1

logging:
  level: INFO
  rich_tracebacks: true
  show_path: false

uz_thresholds:
  ordinary_large_unique: 30
  ordinary_large_occurrences: 150
  ordinary_large_rows: 80
  government_large_unique: 8
  government_large_occurrences: 30
  government_large_rows: 15
  payment_large_unique: 5
  payment_large_occurrences: 8
  payment_large_rows: 5
